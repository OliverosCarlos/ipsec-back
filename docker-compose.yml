version: "3.8"

services:
  web:
    image: ${DOCKER_REGISTRY:-localhost:5000}/ipsec-back:${IMAGE_TAG:-latest}
    volumes:
      - static_files:/app/staticfiles
      - media_files:/app/media
    env_file:
      - .env
    networks:
      - core_gateway_network
      - default
    deploy:
      replicas: 1
      restart_policy:
        condition: any
        delay: 5s
        max_attempts: 5
        window: 120s
      update_config:
        parallelism: 1
        delay: 10s
        order: start-first
        failure_action: rollback
      rollback_config:
        parallelism: 1
        delay: 5s
      resources:
        limits:
          cpus: "1.0"
          memory: 512M
        reservations:
          cpus: "0.25"
          memory: 128M
    healthcheck:
      test: ["CMD-SHELL", "python -c 'import urllib.request; urllib.request.urlopen(\"http://localhost:8000/admin/\")' || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  nginx:
    image: nginx:1.27-alpine
    expose:
      - "80"
    volumes:
      - static_files:/app/staticfiles:ro
      - media_files:/app/media:ro
    configs:
      - source: nginx_conf
        target: /etc/nginx/conf.d/default.conf
    networks:
      - core_gateway_network
      - default
    deploy:
      replicas: 1
      restart_policy:
        condition: any
        delay: 5s
        max_attempts: 5
        window: 60s
      update_config:
        parallelism: 1
        delay: 5s
        order: start-first
      resources:
        limits:
          cpus: "0.5"
          memory: 128M
        reservations:
          cpus: "0.1"
          memory: 64M

configs:
  nginx_conf:
    file: ./nginx/nginx.conf

volumes:
  static_files:
    driver: local
  media_files:
    driver: local

networks:
  core_gateway_network:
    external: true
    driver: overlay
  default:
    driver: overlay
